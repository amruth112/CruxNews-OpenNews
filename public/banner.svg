<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="40%" stop-color="#0f0f18"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#f5f0eb" stop-opacity="0.07"/>
      <stop offset="60%" stop-color="#f5f0eb" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#f5f0eb" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line-left" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#333" stop-opacity="0"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
    <linearGradient id="line-right" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#333"/>
      <stop offset="100%" stop-color="#333" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.6" fill="#1a1a1a"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" rx="12" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="12" fill="url(#grid)" opacity="0.8"/>
  <ellipse cx="600" cy="110" rx="500" ry="250" fill="url(#glow)"/>

  <!-- Spiral logo -->
  <g transform="translate(554, 18) scale(1.7)">
    <path d="M34 29 C34 31.5,32.5 33.5,30 33.5 C27 33.5,25.5 31,25.5 28.5 C25.5 25.5,28 22.5,31 22.5 C35 22.5,38.5 25,39 29 C39.5 34,36 38.5,31 38.5 C24.5 38.5,20.5 34,20 28.5 C19.5 22,24 16.5,31 16 C39.5 15.5,46 22,46 30 C46 39,40 47,31 47" fill="none" stroke="#f5f0eb" stroke-width="2.8" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <text x="600" y="170" text-anchor="middle" fill="#f5f0eb" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, sans-serif" font-size="44" font-weight="800" letter-spacing="2">OpenNews</text>

  <!-- Tagline -->
  <text x="600" y="204" text-anchor="middle" fill="#777" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, sans-serif" font-size="15" font-weight="400" letter-spacing="3">SEE EVERY SIDE OF THE STORY</text>

  <!-- Decorative divider -->
  <line x1="180" y1="232" x2="510" y2="232" stroke="url(#line-left)" stroke-width="0.5"/>
  <circle cx="540" cy="232" r="1.5" fill="#444"/>
  <circle cx="560" cy="232" r="1" fill="#333"/>
  <circle cx="600" cy="232" r="2.5" fill="#555"/>
  <circle cx="640" cy="232" r="1" fill="#333"/>
  <circle cx="660" cy="232" r="1.5" fill="#444"/>
  <line x1="690" y1="232" x2="1020" y2="232" stroke="url(#line-right)" stroke-width="0.5"/>

  <!-- Stats -->
  <text x="330" y="274" text-anchor="middle" fill="#555" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, sans-serif" font-size="11" font-weight="600" letter-spacing="2.5">116 SOURCES</text>
  <circle cx="465" cy="271" r="1.5" fill="#333"/>
  <text x="600" y="274" text-anchor="middle" fill="#555" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, sans-serif" font-size="11" font-weight="600" letter-spacing="2.5">CLIENT-SIDE AI</text>
  <circle cx="735" cy="271" r="1.5" fill="#333"/>
  <text x="870" y="274" text-anchor="middle" fill="#555" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, sans-serif" font-size="11" font-weight="600" letter-spacing="2.5">ZERO TRACKING</text>

  <!-- Subtle top/bottom lines -->
  <line x1="0" y1="1" x2="1200" y2="1" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="0" y1="319" x2="1200" y2="319" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Border -->
  <rect width="1200" height="320" rx="12" fill="none" stroke="#1f1f1f" stroke-width="1"/>
</svg>
